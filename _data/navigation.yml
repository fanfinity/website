# Navigation — single source of truth for header + footer.
#
# IA: Meiro-modeled, Fanfinity-adapted. Five top-level items lead with the LIVE
# data engine (Fanfinity ID), not widget hype. Company lives in the footer.
# Scanner is an internal sales tool — deliberately NOT in public nav.
# Integrations/Customers omitted until real (no invented connectors or logos).
#
# NOTE (2026-07-11 launch): links to still-stubbed pages are intentionally
# removed from nav so the live site has no dead-ends — the comparison pages
# (/compare/*), Blog, Webinars, Partners, Careers, Newsroom, and Customers.
# The stub files still exist; re-add each link here as its page is written.
#
# Mega-menus use `groups: [{heading, links}]`; simple dropdowns use `children`.
# `badge:` on a link renders a pill (Live / Preview / Flagship) — the honesty cue.
# `home` points at the public homepage (launched 2026-07-11: the full site now
# serves at `/`; the old Coming Soon splash is preserved at `/coming-soon`).
#
# NOTE: title/desc are quoted because several contain commas — unquoted commas
# inside a YAML flow mapping { ... } are parsed as field separators and break the build.

home: /

header:
  # ------------------------------------------------------------------ PLATFORM
  - title: Platform
    url: /platform
    mega: true
    groups:
      - heading: The fan data engine
        links:
          - { title: "Platform Overview", url: /platform,     desc: "Collect, resolve, activate, prove",       icon: stack }
          - { title: "How it works",      url: /platform#how, desc: "Fragmented signals to one fan graph",     icon: link }
          - { title: "Fanfinity ID",      url: /platform/id,  desc: "The consented first-party fan graph",     icon: identity, badge: Live }
      - heading: Products
        links:
          - { title: "Fanfinity ID",       url: /platform/id,       desc: "CDP & identity resolution",         icon: identity,  badge: Live }
          - { title: "Fanfinity Engage",   url: /platform/engage,   desc: "Live interactivity & loyalty",      icon: bolt,      badge: Preview }
          - { title: "Fanfinity Activate", url: /platform/activate, desc: "WhatsApp, email, push & ad audiences", icon: megaphone }
          - { title: "Fanfinity Measure",  url: /platform/measure,  desc: "Attribution & sponsorship proof",   icon: chart }
      - heading: Deploy & trust
        links:
          - { title: "In-Kingdom & Residency", url: /platform/data-residency, desc: "PDPL, Saudi data residency",       icon: shield }
          - { title: "Security & Compliance",  url: /platform/security,       desc: "PDPL, GDPR, SOC 2 posture",        icon: shield }
          - { title: "Deploy Anywhere",        url: /platform/deploy,         desc: "Cloud, on-prem or managed",        icon: stack }
          - { title: "Architecture",           url: /platform/architecture,   desc: "How the platform fits together",   icon: link }
          - { title: "Developers & APIs",      url: /developers,              desc: "REST API & SDKs",                  icon: code }

  # ---------------------------------------------------------------- SOLUTIONS
  - title: Solutions
    url: /solutions
    mega: true
    groups:
      - heading: By industry
        links:
          - { title: "Sports & Entertainment", url: /solutions/sports, desc: "Clubs, leagues, media & sponsors", icon: whistle, badge: Flagship }
          - { title: "Media & Broadcast",      url: /solutions/media,  desc: "Turn audiences into known fans",   icon: broadcast }
          - { title: "Brands & Sponsors",      url: /solutions/brands, desc: "Prove & activate sponsored reach", icon: megaphone }
      - heading: More industries
        links:
          - { title: "Retail & E-commerce",  url: /solutions/retail,  desc: "Personalize the shopper journey",     icon: gift }
          - { title: "Banking & Finance",    url: /solutions/banking, desc: "Compliant, real-time engagement",     icon: scale }
          - { title: "Travel & Hospitality", url: /solutions/travel,  desc: "Loyalty across every trip",           icon: spark }
          - { title: "iGaming & Betting",    url: /solutions/igaming, desc: "Acquire & retain high-value players", icon: target }
          - { title: "Telco",                url: /solutions/telco,   desc: "Monetize the subscriber base",        icon: plug }
          - { title: "All industries",       url: /industries,        desc: "See every vertical",                  icon: stack }
      - heading: By team
        links:
          - { title: "Marketing & Growth", url: /solutions/marketing,   desc: "Segment, activate, measure",  icon: megaphone }
          - { title: "Data & Engineering", url: /solutions/engineering, desc: "Own your data & pipelines",   icon: code }
          - { title: "AI & Agents",        url: /solutions/ai-agents,   desc: "Governed context for agents", icon: spark }

  # ------------------------------------------------------------- WHY FANFINITY
  - title: Why Fanfinity
    url: /why-fanfinity
    mega: true
    groups:
      - heading: Why Fanfinity
        links:
          - { title: "Why Fanfinity",           url: /why-fanfinity,           desc: "Real-time, in-region fan CDP",       icon: spark }
          - { title: "The in-region fan graph", url: /why-fanfinity#residency, desc: "Consented, first-party, in-Kingdom", icon: shield }
          - { title: "From signals to proof",   url: /why-fanfinity#flow,      desc: "Collect, resolve, activate, prove",  icon: link }
      - heading: Compare
        links:
          - { title: "vs LiveLike",  url: /compare/livelike,  desc: "vs a hosted engagement suite",       icon: scale }
          - { title: "vs Meiro",     url: /compare/meiro,     desc: "vs a horizontal CDP",                icon: scale }
          - { title: "vs Segment",   url: /compare/segment,   desc: "vs a cloud-first SaaS CDP",          icon: scale }
          - { title: "vs Hightouch", url: /compare/hightouch, desc: "vs a warehouse activation layer",    icon: scale }

  # ---------------------------------------------------------------- RESOURCES
  - title: Resources
    url: /resources
    children:
      - { title: "Developers & Docs", url: /developers, desc: "REST API & SDKs",     icon: code }

  # ------------------------------------------------------------------ PRICING
  - title: Pricing
    url: /pricing

