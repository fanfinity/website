# Navigation — single source of truth for header + footer.
#
# Iteration: horizontal, Meiro-scale IA with Sports & Entertainment as the flagship
# vertical. Six top-level items. Mega-menus use `groups: [{heading, links}]`; simple
# dropdowns use `children`. `home` points at the preview homepage while public `/` is
# still "Coming Soon"; at public launch set `home: /`.
#
# NOTE: title/desc are quoted because several contain commas — unquoted commas inside
# a YAML flow mapping { ... } are parsed as field separators and break the build.

home: /home-preview

header:
  # ------------------------------------------------------------------ PRODUCT
  - title: Product
    url: /product
    mega: true
    groups:
      - heading: Overview
        links:
          - { title: "Platform Overview",     url: /product,                     desc: "Four products, one system",         icon: stack }
          - { title: "Why Fanfinity",         url: /product#why,                 desc: "Identity + engagement + proof",     icon: spark }
      - heading: Products
        links:
          - { title: "Fanfinity ID",          url: /product/fanfinity-id,        desc: "CDP & identity resolution",         icon: identity }
          - { title: "Fanfinity Engage",      url: /product/fanfinity-engage,    desc: "Live interactivity & loyalty",      icon: bolt }
          - { title: "Fanfinity Activate",    url: /product/fanfinity-activate,  desc: "WhatsApp, email, push & ads",       icon: megaphone }
          - { title: "Fanfinity Measure",     url: /product/fanfinity-measure,   desc: "Attribution & monetization",        icon: chart }
      - heading: Capabilities
        links:
          - { title: "Identity Resolution",   url: /product/identity-resolution, desc: "Golden record, real-time",          icon: identity }
          - { title: "Segmentation",          url: /product/segmentation,        desc: "Build & sync audiences",            icon: target }
          - { title: "Personalization",       url: /product/personalization,     desc: "1:1 across every channel",          icon: spark }
          - { title: "Integrations",          url: /integrations,                desc: "100+ connectors",                   icon: plug }
          - { title: "Developers & APIs",     url: /developers,                  desc: "REST API & SDKs",                   icon: code }

  # ----------------------------------------------------------------- PLATFORM
  - title: Platform
    url: /platform
    mega: true
    groups:
      - heading: Deploy anywhere
        links:
          - { title: "Deploy Anywhere",       url: /platform,                    desc: "Cloud, on-prem or managed",         icon: stack }
          - { title: "Cloud (AWS/GCP/Azure)", url: /platform/cloud,              desc: "Any provider, any region",          icon: stack }
          - { title: "On-Premise",            url: /platform/on-premise,         desc: "Your own infrastructure",           icon: stack }
      - heading: Trust & compliance
        links:
          - { title: "In-Kingdom & Residency", url: /platform/data-residency,    desc: "PDPL, Saudi data residency",        icon: shield }
          - { title: "Security & Compliance", url: /platform/security,           desc: "PDPL, GDPR, SOC 2",                 icon: shield }
          - { title: "Architecture",          url: /platform/architecture,       desc: "How the platform works",            icon: link }

  # ---------------------------------------------------------------- SOLUTIONS
  - title: Solutions
    url: /solutions
    mega: true
    groups:
      - heading: By industry
        links:
          - { title: "Sports & Entertainment", url: /solutions/sports,   desc: "Flagship — clubs, leagues, media & sponsors", icon: whistle, badge: Flagship }
          - { title: "Retail & E-commerce",    url: /solutions/retail,   desc: "Personalize the shopper journey",   icon: gift }
          - { title: "Banking & Finance",      url: /solutions/banking,  desc: "Compliant, real-time engagement",   icon: scale }
          - { title: "Media & Publishers",     url: /solutions/media,    desc: "Turn audiences into subscribers",   icon: broadcast }
          - { title: "Travel & Hospitality",   url: /solutions/travel,   desc: "Loyalty across every trip",         icon: spark }
          - { title: "iGaming & Betting",      url: /solutions/igaming,  desc: "Acquire & retain high-value players", icon: target }
          - { title: "Telco",                  url: /solutions/telco,    desc: "Monetize the subscriber base",      icon: plug }
      - heading: By team
        links:
          - { title: "Marketing & Growth",     url: /solutions/marketing,    desc: "Segment, activate, measure",    icon: megaphone }
          - { title: "Data & Engineering",     url: /solutions/engineering,  desc: "Own your data & pipelines",     icon: code }
          - { title: "AI & Agents",            url: /solutions/ai-agents,    desc: "Governed context for agents",   icon: spark }

  # ---------------------------------------------------------------- USE CASES
  - title: Use Cases
    url: /use-cases
    mega: true
    groups:
      - heading: By capability
        links:
          - { title: "Identity",   url: /use-cases/identity,   desc: "Golden record, resolution, consent", icon: identity }
          - { title: "Engage",     url: /use-cases/engage,     desc: "Polls, predictions, games, loyalty", icon: bolt }
          - { title: "Activate",   url: /use-cases/activate,   desc: "WhatsApp, email, journeys, churn",   icon: megaphone }
          - { title: "Measure",    url: /use-cases/measure,    desc: "ROI, verified reach, monetization",  icon: chart }

  # ---------------------------------------------------------------- RESOURCES
  - title: Resources
    url: /resources
    children:
      - { title: "Blog",             url: /blog,        desc: "Insights & playbooks",      icon: book }
      - { title: "Customer Stories", url: /customers,   desc: "Case studies with metrics", icon: trophy }
      - { title: "Digital Scanner",  url: /scanner,     desc: "Free maturity assessment",  icon: gauge }
      - { title: "Webinars & Events", url: /webinars,   desc: "Live & on-demand",          icon: broadcast }
      - { title: "Developers & Docs", url: /developers, desc: "REST API & SDKs",           icon: code }
      - { title: "Compare",          url: /compare,     desc: "Fanfinity vs alternatives", icon: scale }

  # ------------------------------------------------------------------ PRICING
  - title: Pricing
    url: /pricing

