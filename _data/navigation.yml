# Navigation — single source of truth for header + footer.
#
# IA: Meiro-modeled, Fanfinity-adapted. Five top-level items lead with the LIVE
# data engine (Fanfinity ID), not widget hype. Company lives in the footer.
# Integrations/Customers omitted from the header until fuller (no invented logos).
#
# NOTE (2026-07-12 IA pass): stub pages (Blog, Webinars, Customers, Partners,
# Careers, Newsroom) ARE linked in nav — they're friendly "in progress" pages,
# not dead-ends — but carry `noindex` (front matter) and are excluded from
# sitemap.xml until their content lands. Every other nav link resolves to a
# distinct, finished destination (no URL aliasing).
#
# Mega-menus use `groups: [{heading, links}]`; simple dropdowns use `children`.
# `badge:` on a link renders a pill (Live / Preview / Flagship) — the honesty cue.
# `home` points at the public homepage (the full site serves at `/`).
#
# NOTE: title/desc are quoted because several contain commas — unquoted commas
# inside a YAML flow mapping { ... } are parsed as field separators and break the build.

home: /

header:
  # ------------------------------------------------------------------ PLATFORM
  - title: Platform
    url: /platform
    product_cards: true
    products:
      - title: "Fanfinity Blocks"
        url: /platform/blocks
        badge: Live
        category: CDI
        tagline: "Collect, enrich, connect"
        features:
          - { title: "Event Collection",   desc: "Capture signals from every fan touchpoint",    url: /platform/blocks/event-collection }
          - { title: "Reverse ETL",        desc: "Push data to your full tool stack",             url: /platform/blocks/reverse-etl }
          - { title: "Identity Stitching", desc: "Match identifiers across devices and channels", url: /platform/blocks/identity-stitching }
          - { title: "AI Enrichment",      desc: "Structured context for models and agents",      url: /platform/blocks/ai-enrichment }
          - { title: "Integrations",       desc: "Connect your existing stack",                   url: /integrations }
      - title: "Fanfinity ID"
        url: /platform/id
        badge: Live
        category: CDP
        tagline: "Know every fan"
        features:
          - { title: "Single Fan View",        desc: "One governed golden profile per fan",    url: /platform/id/single-fan-view }
          - { title: "Audience Builder",        desc: "Segment on any attribute or behavior",  url: /platform/id/audience-builder }
          - { title: "Consent & Governance",    desc: "PDPL and residency built in",           url: /platform/id/consent-governance }
          - { title: "Real-time Profiles",      desc: "Resolved as events land, not overnight",url: /platform/id/real-time-profiles }
      - title: "Fanfinity Engage"
        url: /platform/engage
        badge: Preview
        category: CEP
        tagline: "Engage every fan"
        # Engagement mechanics only — channels & journeys live under Activate.
        features:
          - { title: "Live Widgets",      desc: "Polls, predictions, quizzes and more",    url: /platform/engage/live-widgets }
          - { title: "Gamification",      desc: "Streaks, quests, badges and leaderboards", url: /platform/engage/gamification }
          - { title: "Loyalty & Rewards", desc: "Points economy across every touchpoint",  url: /platform/engage/loyalty-rewards }
          - { title: "Programs & Themes", desc: "Sponsorable programs and theming",         url: /platform/engage/programs-themes }
      - title: "Fanfinity Activate"
        url: /platform/activate
        badge: Live
        category: Activation
        tagline: "Reach every fan"
        # Owns every outbound channel + journeys — messaging (owned) vs Ad Audiences (paid).
        features:
          - { title: "Omnichannel Messaging", desc: "WhatsApp, email, and push",                url: /platform/activate/omnichannel-messaging }
          - { title: "Audience Segmentation", desc: "Build once, activate everywhere",          url: /platform/activate/audience-segmentation }
          - { title: "Journey Orchestration", desc: "Multi-step flows that react in real time",  url: /platform/activate/journey-orchestration }
          - { title: "Ad Audiences",          desc: "Lookalikes and convert-suppression",       url: /platform/activate/ad-audiences }
      - title: "Fanfinity Measure"
        url: /platform/measure
        badge: Live
        category: Reporting
        tagline: "Prove the value"
        features:
          - { title: "Verified Reach",  desc: "Real people, not impressions",           url: /platform/measure/verified-reach }
          - { title: "Attribution",     desc: "Exposure-to-outcome, deterministically", url: /platform/measure/attribution }
          - { title: "Sponsor Portal",  desc: "Live results for partners and sponsors", url: /platform/measure/sponsor-portal }
    sidebar:
      url: /platform/deploy
      tagline: "Any cloud. Any on-prem."
      body: "Your cloud, your on-prem, or fully managed. Residency and compliance built into the data layer."
      link_text: "Explore deployment"

  # ---------------------------------------------------------------- SOLUTIONS
  - title: Solutions
    url: /solutions
    mega: true
    groups:
      - heading: By use case
        links:
          - { title: "Anonymous to Known",   url: /solutions/convert-visitors, desc: "Build rich profiles from the first page load", icon: identity }
          - { title: "Grow Lifetime Value",  url: /solutions/boost-clv,        desc: "Loyalty, journeys, and rewards that compound", icon: coins }
          - { title: "Prevent Churn",        url: /solutions/prevent-churn,    desc: "Catch drift before it becomes departure",       icon: repeat }
          - { title: "Sharpen Ad Targeting", url: /solutions/optimize-adspend, desc: "Real-time suppression and smarter lookalikes",  icon: target }
      - heading: By industry
        links:
          - { title: "Sports & Entertainment", url: /solutions/sports, desc: "Clubs, leagues, media & sponsors", icon: whistle, badge: Flagship }
          - { title: "Media & Publishers",     url: /solutions/media,  desc: "Turn audiences into known fans",   icon: broadcast }
          - { title: "Brands & Sponsors",      url: /solutions/brands, desc: "Prove & activate sponsored reach", icon: handshake }
          - { title: "Travel & Hospitality",   url: /solutions/travel, desc: "One guest across every trip",      icon: airplane }
          - { title: "Retail & E-commerce",    url: /solutions/retail, desc: "Personalize the shopper journey",  icon: gift }
      - heading: By team
        links:
          - { title: "Marketing & Growth", url: /solutions/marketing,   desc: "Segment, activate, measure",  icon: megaphone }
          - { title: "Data & Engineering", url: /solutions/engineering, desc: "Own your data & pipelines",   icon: code }
          - { title: "AI & Agents",        url: /solutions/ai-agents,   desc: "Governed context for agents", icon: spark }

  # ---------------------------------------------------------------- RESOURCES
  - title: Resources
    url: /resources
    groups:
      # Each link resolves to a distinct destination — no aliasing the same URL.
      # "Resource Library" is the only desktop path to the /resources hub (the
      # top-level Resources button is a dropdown trigger, not a link).
      - heading: Learn
        links:
          - { title: "Resource Library", url: /resources,  desc: "Guides, reports, and whitepapers",         icon: stack }
          - { title: "Blog",             url: /blog,       desc: "Insights on fan data and sports tech",    icon: book }
          - { title: "Case Studies",     url: /customers,  desc: "Customer success stories",                icon: chart }
          - { title: "Webinars",         url: /webinars,   desc: "Live and on-demand sessions",             icon: broadcast }
          - { title: "Developers",       url: /developers, desc: "REST API, SDKs, and the data model",      icon: code }

  # ------------------------------------------------------------------ PRICING
  - title: Pricing
    url: /pricing

cta:
  title: Book a Demo
  url: /demo

