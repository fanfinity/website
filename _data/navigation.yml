# Navigation — single source of truth for header + footer.
#
# The site is a real multi-page marketing site. `home` is the homepage the logo +
# breadcrumbs point to. Public `/` is still "Coming Soon" while we build, so `home`
# points at the preview homepage; at public launch set `home: /`.
#
# Only link to pages that exist. This pass builds: Platform hub + 5 pillars,
# Solutions hub + 3 verticals, Developers hub, Pricing, Demo. Resources/Blog/
# Customers/Compare/About/Legal are a later wave — add their nav entries then.

home: /home-preview

header:
  - title: Solutions
    url: /solutions
    children:
      - { title: Sports Leagues & Teams, url: /solutions/sports,       desc: Keep fans engaged all season,    icon: whistle }
      - { title: Broadcasters & Media,   url: /solutions/broadcasters,  desc: Grow watch time & engagement,    icon: broadcast }
      - { title: Brands,                 url: /solutions/brands,        desc: Activate fans, prove results,    icon: megaphone }

  - title: Platform
    url: /platform
    mega: true
    children:
      - { title: Live Interactivity,       url: /platform/live-interactivity,   desc: Widgets, programs & reactions,    icon: bolt }
      - { title: Gamification & Loyalty,   url: /platform/gamification-loyalty, desc: Quests, streaks & leaderboards,   icon: trophy }
      - { title: Rewards & Monetization,   url: /platform/rewards-monetization, desc: A rewards economy & sponsorship,  icon: gift }
      - { title: Fan Identity & Community, url: /platform/fan-identity,         desc: One identity across every device, icon: identity }
      - { title: Insights & Operations,    url: /platform/insights-analytics,   desc: Built-in engagement analytics,    icon: chart }

  - title: Developers
    url: /developers

  - title: Pricing
    url: /pricing

cta:
  title: Book a Demo
  url: /demo

footer_columns:
  - heading: Platform
    links:
      - { title: Live Interactivity,       url: /platform/live-interactivity }
      - { title: Gamification & Loyalty,   url: /platform/gamification-loyalty }
      - { title: Rewards & Monetization,   url: /platform/rewards-monetization }
      - { title: Fan Identity & Community, url: /platform/fan-identity }
      - { title: Insights & Operations,    url: /platform/insights-analytics }

  - heading: Solutions
    links:
      - { title: Sports Leagues & Teams, url: /solutions/sports }
      - { title: Broadcasters & Media,   url: /solutions/broadcasters }
      - { title: Brands,                 url: /solutions/brands }
      - { title: Pricing,                url: /pricing }

  - heading: Company
    links:
      - { title: Developers,  url: /developers }
      - { title: Book a Demo, url: /demo }

descriptor: The fan-engagement & loyalty platform for live sports, media, and brands.
