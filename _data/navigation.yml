# Navigation — single source of truth for header + footer.
#
# IA: Meiro-modeled, Fanfinity-adapted. Five top-level items lead with the LIVE
# data engine (Fanfinity ID), not widget hype. Company lives in the footer.
# Integrations/Customers omitted from the header until fuller (no invented logos).
#
# NOTE (2026-07-12 IA pass): stub pages (Blog, Webinars, Customers, Partners,
# Careers, Newsroom) ARE linked in nav — they're friendly "in progress" pages,
# not dead-ends — but carry `noindex` (front matter) and are excluded from
# sitemap.xml until their content lands. Every other nav link resolves to a
# distinct, finished destination (no URL aliasing).
#
# Mega-menus use `groups: [{heading, links}]`; simple dropdowns use `children`.
# `badge:` on a link renders a pill (Live / Preview / Flagship) — the honesty cue.
# `home` points at the public homepage (the full site serves at `/`).
#
# NOTE: title/desc are quoted because several contain commas — unquoted commas
# inside a YAML flow mapping { ... } are parsed as field separators and break the build.

home: /

header:
  # ------------------------------------------------------------------ PLATFORM
  - title: Platform
    url: /platform
    product_cards: true
    products:
      - title: "Fanfinity Blocks"
        url: /platform/blocks
        badge: Live
        category: CDI
        tagline: "Collect, enrich, connect"
        features:
          - { title: "Event Collection",   desc: "Capture signals from every fan touchpoint",    url: /platform/blocks }
          - { title: "Reverse ETL",        desc: "Push data to your full tool stack",             url: /platform/blocks }
          - { title: "Identity Stitching", desc: "Match identifiers across devices and channels", url: /platform/blocks }
          - { title: "AI Enrichment",      desc: "Structured context for models and agents",      url: /platform/blocks }
          - { title: "Integrations",       desc: "Connect your existing stack",                   url: /platform/blocks }
      - title: "Fanfinity ID"
        url: /platform/id
        badge: Live
        category: CDP
        tagline: "Know every fan"
        features:
          - { title: "Single Fan View",        desc: "One governed golden profile per fan",    url: /platform/id }
          - { title: "Audience Builder",        desc: "Segment on any attribute or behavior",  url: /platform/id }
          - { title: "Consent & Governance",    desc: "PDPL and residency built in",           url: /platform/id }
          - { title: "Real-time Profiles",      desc: "Resolved as events land, not overnight",url: /platform/id }
      - title: "Fanfinity Engage"
        url: /platform/engage
        badge: Preview
        category: CEP
        tagline: "Engage every fan"
        # Engagement mechanics only — channels & journeys live under Activate.
        features:
          - { title: "Live Widgets",      desc: "Polls, predictions, quizzes and more",    url: /platform/engage }
          - { title: "Gamification",      desc: "Streaks, quests, badges and leaderboards", url: /platform/engage }
          - { title: "Loyalty & Rewards", desc: "Points economy across every touchpoint",  url: /platform/engage }
          - { title: "Programs & Themes", desc: "Sponsorable programs and theming",         url: /platform/engage }
      - title: "Fanfinity Activate"
        url: /platform/activate
        badge: Live
        category: Activation
        tagline: "Reach every fan"
        # Owns every outbound channel + journeys — messaging (owned) vs Ad Audiences (paid).
        features:
          - { title: "Omnichannel Messaging", desc: "WhatsApp, email, and push",                url: /platform/activate }
          - { title: "Audience Segmentation", desc: "Build once, activate everywhere",          url: /platform/activate }
          - { title: "Journey Orchestration", desc: "Multi-step flows that react in real time",  url: /platform/activate }
          - { title: "Ad Audiences",          desc: "Lookalikes and convert-suppression",       url: /platform/activate }
      - title: "Fanfinity Measure"
        url: /platform/measure
        badge: Live
        category: Reporting
        tagline: "Prove the value"
        features:
          - { title: "Verified Reach",  desc: "Real people, not impressions",           url: /platform/measure }
          - { title: "Attribution",     desc: "Exposure-to-outcome, deterministically", url: /platform/measure }
          - { title: "Sponsor Portal",  desc: "Live results for partners and sponsors", url: /platform/measure }
          - { title: "Benchmarking",    desc: "Performance context across campaigns",   url: /platform/measure }
    sidebar:
      url: /platform/deploy
      tagline: "Any cloud. Any on-prem."
      body: "Your cloud, your on-prem, or fully managed. Residency and compliance built into the data layer."
      link_text: "Explore deployment"

  # ---------------------------------------------------------------- SOLUTIONS
  - title: Solutions
    url: /solutions
    mega: true
    groups:
      - heading: By use case
        links:
          - { title: "Anonymous to Known",   url: /solutions/convert-visitors, desc: "Build rich profiles from the first page load", icon: identity }
          - { title: "Grow Lifetime Value",  url: /solutions/boost-clv,        desc: "Loyalty, journeys, and rewards that compound", icon: coins }
          - { title: "Prevent Churn",        url: /solutions/prevent-churn,    desc: "Catch drift before it becomes departure",       icon: repeat }
          - { title: "Sharpen Ad Targeting", url: /solutions/optimize-adspend, desc: "Real-time suppression and smarter lookalikes",  icon: target }
      - heading: By industry
        links:
          - { title: "Sports & Entertainment", url: /solutions/sports, desc: "Clubs, leagues, media & sponsors", icon: whistle, badge: Flagship }
          - { title: "Media & Broadcast",      url: /solutions/media,  desc: "Turn audiences into known fans",   icon: broadcast }
          - { title: "Brands & Sponsors",      url: /solutions/brands, desc: "Prove & activate sponsored reach", icon: handshake }
          - { title: "Events & Hospitality",   url: /solutions/travel, desc: "Loyalty across every event",       icon: airplane }
          - { title: "Retail & E-commerce",    url: /solutions/retail, desc: "Personalize the shopper journey",  icon: gift }
      - heading: By team
        links:
          - { title: "Marketing & Growth", url: /solutions/marketing,   desc: "Segment, activate, measure",  icon: megaphone }
          - { title: "Data & Engineering", url: /solutions/engineering, desc: "Own your data & pipelines",   icon: code }
          - { title: "AI & Agents",        url: /solutions/ai-agents,   desc: "Governed context for agents", icon: spark }

  # ---------------------------------------------------------------- RESOURCES
  - title: Resources
    url: /resources
    groups:
      # Each link resolves to a distinct destination — no aliasing the same URL.
      - heading: Learn
        links:
          - { title: "Blog",             url: /blog,       desc: "Insights on fan data and sports tech",    icon: book }
          - { title: "Resource Library", url: /resources,  desc: "Guides, reports, and whitepapers",         icon: stack }
          - { title: "Case Studies",     url: /customers,  desc: "Customer success stories",                icon: chart }
          - { title: "Webinars",         url: /webinars,   desc: "Live and on-demand sessions",             icon: broadcast }
          - { title: "Developers",       url: /developers, desc: "REST API, SDKs, and integration docs",    icon: code }
      - heading: Compare
        links:
          - { title: "All comparisons", url: /compare,           desc: "How Fanfinity stacks up",         icon: scale }
          - { title: "vs LiveLike",     url: /compare/livelike,  desc: "vs a hosted engagement suite",    icon: scale }
          - { title: "vs Meiro",        url: /compare/meiro,     desc: "vs a horizontal CDP",             icon: scale }
          - { title: "vs Segment",      url: /compare/segment,   desc: "vs a cloud-first SaaS CDP",       icon: scale }
          - { title: "vs Hightouch",    url: /compare/hightouch, desc: "vs a warehouse activation layer", icon: scale }

  # ------------------------------------------------------------------ PRICING
  - title: Pricing
    url: /pricing

