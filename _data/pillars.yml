# The five products that make up the Fanfinity platform. Reused on the homepage
# and the /platform hub. Each stands alone; together they form the full loop:
# Collect -> Identify -> Engage -> Activate -> Prove. The CDI and CDP layers
# (Blocks and ID) are LIVE; Engage is a design preview — labeled honestly.

- title: Fanfinity Blocks
  url: /platform/blocks
  icon: plug
  outcome: Connect every signal.
  body: The CDI layer that collects events from every fan touchpoint, stitches identifiers in real time, enriches profiles for AI and activation, and distributes governed data to every tool in your stack.
  capabilities: [Data Collection, Reverse ETL, Identity Stitching, AI Enrichment, Integrations]

- title: Fanfinity ID
  url: /platform/id
  icon: identity
  outcome: Know every fan.
  body: A sovereign CDP and real-time identity graph that unifies every touchpoint (ticketing, streaming, app, web, on-site, social) into one golden fan profile, with consent governance built in.
  capabilities: [Identity Resolution, Golden Record, Consent & Governance, Real-time Profiles]

- title: Fanfinity Engage
  url: /platform/engage
  icon: bolt
  outcome: Engage and activate every fan. (Preview)
  body: "Live interactivity, gamification, and loyalty — polls, predictions, quizzes, quests, streaks, and leaderboards — combined with omnichannel activation across WhatsApp, email, push, and paid media. In design preview; not yet generally available."
  capabilities: [Widgets & Programs, Gamification, Loyalty & Rewards, WhatsApp & Email, Journey Orchestration, Ad Audiences]

- title: Fanfinity Measure
  url: /platform/measure
  icon: chart
  outcome: Prove the value.
  body: "Deterministic attribution and a sponsor/partner portal: verified reach instead of impressions, exposure-to-outcome measurement, and premium audience monetization."
  capabilities: [Verified Reach, Attribution, Sponsor Portal, Benchmarking]
