# The four products that make up the Fanfinity platform. Reused on the homepage
# ("Four products, one platform") and the /product hub. Each stands alone; together
# they form the full loop: Identify -> Engage -> Activate -> Prove.

- title: Fanfinity ID
  url: /product/fanfinity-id
  icon: identity
  outcome: Know every customer.
  body: A sovereign CDP and real-time identity graph that unifies every touchpoint — ticketing, streaming, app, web, stadium, social — into one golden customer profile, with consent governance built in.
  capabilities: [Identity Resolution, Golden Record, Consent & Governance, Real-time Profiles]

- title: Fanfinity Engage
  url: /product/fanfinity-engage
  icon: bolt
  outcome: Turn watching into playing.
  body: Live interactivity, gamification, and loyalty — polls, predictions, quizzes, quests, streaks, and leaderboards — that turn passive audiences into active, returning communities.
  capabilities: [Widgets & Programs, Gamification, Loyalty & Rewards, Spoiler-safe Sync]

- title: Fanfinity Activate
  url: /product/fanfinity-activate
  icon: megaphone
  outcome: Reach the right person, everywhere.
  body: Orchestrate omnichannel campaigns across WhatsApp, email, push, and paid media — segment on live behavior, build journeys that react, and personalize every message.
  capabilities: [Segmentation, Journey Orchestration, WhatsApp & Email, Ad Audiences]

- title: Fanfinity Measure
  url: /product/fanfinity-measure
  icon: chart
  outcome: Prove the value.
  body: Deterministic attribution and a sponsor/partner portal — verified reach instead of impressions, exposure-to-outcome measurement, and premium audience monetization.
  capabilities: [Verified Reach, Attribution, Sponsor Portal, Benchmarking]
