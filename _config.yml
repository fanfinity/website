url: ''
baseurl: ''
title: 'Fanfinity'

plugins:
  - jekyll-default-layout
  - jekyll-optional-front-matter
  - jekyll-paginate
  - jekyll-readme-index
  - jekyll-titles-from-headings
  - jekyll-relative-links
  - jekyll-seo-tag

exclude:
  - package.json
  - package-lock.json
  - postcss.config.js
  - tailwind.config.js
  - node_modules
  - Gemfile
  - Gemfile.lock
  - src
  # Internal marketing foundation docs — NOT for publication
  - docs
  - competitor-profiles

kramdown:
  syntax_highlighter: rouge
