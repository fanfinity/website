url: 'https://fanfinity.io'
baseurl: ''
title: 'Fanfinity'

plugins:
  - jekyll-default-layout
  - jekyll-optional-front-matter
  - jekyll-paginate
  - jekyll-readme-index
  - jekyll-titles-from-headings
  - jekyll-relative-links
  - jekyll-seo-tag

exclude:
  - package.json
  - package-lock.json
  - postcss.config.js
  - tailwind.config.js
  - node_modules
  - Gemfile
  - Gemfile.lock
  - src
  - scripts
  # Raw source-catalog export — consumed by scripts/build-integrations.mjs into
  # _data/integrations.json; must never be published (carries upstream vendor names).
  - sources.json
  # Repo docs — not public pages
  - README.md
  - CLAUDE.md
  # Image-credit notes — keep in repo, never publish as a page
  - assets/img/CREDITS.md

kramdown:
  syntax_highlighter: rouge

# Lead-capture form endpoint. Empty = forms validate and show an honest
# "not connected yet" message. To go live, paste a POST endpoint here — e.g. a
# Formspree URL (https://formspree.io/f/xxxx), Netlify Forms, or Basin — and the
# demo/contact forms will submit to it (AJAX) and show a real success state.
# No account can be created from here; this is the single switch to flip.
forms:
  endpoint: ""

# Marketing / GTM integration switches. Each stays empty until you provision the
# account and paste the ID/URL — nothing renders or fires while a value is blank,
# so this is safe to commit. The only ad channel is LinkedIn: the Insight Tag
# fires ONLY under the "marketing" consent category (opt-in). No Meta/Google ads.
integrations:
  gtm_id: ''               # Google Tag Manager container, e.g. GTM-XXXXXXX (optional; conversion router)
  linkedin_partner_id: '10520825'  # LinkedIn Insight Tag partner ID — the one ad pixel (marketing consent)
  linkedin_conversion_id: '29391945'  # LinkedIn "Demo & Contact form submit" (Lead, event-specific) — fires on Pipedrive form submit
  pipedrive:
    demo_form_url: 'https://webforms.pipedrive.com/f/cecyeyYFa9OYFkd3KiwyXbtU7j7OQor6aGeV6DkRZWWwZlBll2LdsUD3dq6085jOwP'      # "Fanfinity — Request a demo" web form
    contact_form_url: 'https://webforms.pipedrive.com/f/6zflfKUfwLlsbZF4vaZOEhlzO4lqngs534EuxOp04VjQAzsfYFzD9LXWOf80zah7Q7'   # "Fanfinity — Contact us" web form
    scheduler_url: ''      # Pipedrive Scheduler booking link for /demo (not set up yet)

# Social share defaults (jekyll-seo-tag). og-card.png is the branded 1200×630
# card (regenerate via a 1200×630 headless-Chrome screenshot if the tagline changes).
twitter:
  card: summary_large_image
defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/og-card.png
