url: 'https://fanfinity.io'
baseurl: ''
title: 'Fanfinity'

plugins:
  - jekyll-default-layout
  - jekyll-optional-front-matter
  - jekyll-paginate
  - jekyll-readme-index
  - jekyll-titles-from-headings
  - jekyll-relative-links
  - jekyll-seo-tag

exclude:
  - package.json
  - package-lock.json
  - postcss.config.js
  - tailwind.config.js
  - node_modules
  - Gemfile
  - Gemfile.lock
  - src
  - scripts
  # Raw source-catalog export — consumed by scripts/build-integrations.mjs into
  # _data/integrations.json; must never be published (carries upstream vendor names).
  - sources.json
  # Repo docs — not public pages
  - README.md
  - CLAUDE.md

kramdown:
  syntax_highlighter: rouge

# Lead-capture form endpoint. Empty = forms validate and show an honest
# "not connected yet" message. To go live, paste a POST endpoint here — e.g. a
# Formspree URL (https://formspree.io/f/xxxx), Netlify Forms, or Basin — and the
# demo/contact forms will submit to it (AJAX) and show a real success state.
# No account can be created from here; this is the single switch to flip.
forms:
  endpoint: ""

# Social share defaults (jekyll-seo-tag). NOTE: home-hero.jpg is a stand-in —
# replace with a branded 1200×630 og image before public launch.
twitter:
  card: summary_large_image
defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/home-hero.jpg
