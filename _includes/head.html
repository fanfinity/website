<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b0712">
  <!-- Mark JS-capable so scroll-reveal content stays visible if JS never runs (no-JS fallback). -->
  <script>document.documentElement.classList.add('js');</script>

  <!-- Fonts: Poppins (headings), Inter (body), Geist Mono (labels/code), all Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap">

  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">

  {%- comment -%}Keep unfinished "in progress" stubs out of the index while they stay linked for humans.{%- endcomment -%}
  {%- if page.noindex -%}<meta name="robots" content="noindex, follow">{%- endif -%}

  {% seo %}

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- Cookie Consent -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.1.0/dist/cookieconsent.css">
  <style>
    #cc-main { --cc-btn-primary-bg: #9969ff; --cc-btn-primary-hover-bg: #7c4dff; --cc-toggle-on-bg: #9969ff; }
  </style>
  <script defer src="https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.1.0/dist/cookieconsent.umd.js"></script>
  <script defer>
    CookieConsent.run({
      categories: {
        necessary: { enabled: true, readOnly: true },
        analytics: {}
      },
      language: {
        default: 'en',
        translations: {
          en: {
            consentModal: {
              title: 'We use cookies',
              description: 'We use analytics cookies (Google Analytics, Microsoft Clarity) to understand how visitors use our site. You can accept or decline below.',
              acceptAllBtn: 'Accept all',
              acceptNecessaryBtn: 'Reject all',
              showPreferencesBtn: 'Manage preferences'
            },
            preferencesModal: {
              title: 'Cookie preferences',
              acceptAllBtn: 'Accept all',
              acceptNecessaryBtn: 'Reject all',
              savePreferencesBtn: 'Save preferences',
              sections: [
                {
                  title: 'Strictly necessary',
                  description: 'Required for the site to function. Cannot be disabled.',
                  linkedCategory: 'necessary'
                },
                {
                  title: 'Analytics',
                  description: 'Google Analytics and Microsoft Clarity help us understand how visitors interact with our site.',
                  linkedCategory: 'analytics'
                }
              ]
            }
          }
        }
      }
    });
  </script>

  <!-- Google Analytics (fires only after analytics consent) -->
  <script type="text/plain" data-category="analytics" async src="https://www.googletagmanager.com/gtag/js?id=G-CVYGF0ZQTT"></script>
  <script type="text/plain" data-category="analytics">
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CVYGF0ZQTT');
  </script>

  <!-- Microsoft Clarity (fires only after analytics consent) -->
  <script type="text/plain" data-category="analytics">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xlwzjpz4m4");
  </script>
</head>
