<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b0712">
  <!-- Mark JS-capable so scroll-reveal content stays visible if JS never runs (no-JS fallback). -->
  <script>document.documentElement.classList.add('js');</script>

  <!-- Fonts: Poppins (headings), Inter (body), Geist Mono (labels/code), all Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap">

  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">

  {%- comment -%}Keep unfinished "in progress" stubs out of the index while they stay linked for humans.{%- endcomment -%}
  {%- if page.noindex -%}<meta name="robots" content="noindex, follow">{%- endif -%}

  {% seo %}

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

</head>
